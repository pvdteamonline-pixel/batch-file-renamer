name: Build Windows Installer (.exe)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron (TypeScript)
        run: npm run build

      # --- Code signing (optional) ---
      # ถ้ามี Windows Code Signing Certificate ให้ใส่ secrets เหล่านี้ใน
      # GitHub repo Settings > Secrets and variables > Actions:
      #   WIN_CERT_P12_BASE64  (base64 ของไฟล์ .p12/.pfx)
      #   WIN_CERT_PASSWORD    (รหัสผ่านของ certificate)
      # ถ้าไม่มี .exe จะเป็นแบบ unsigned (ผู้ใช้เปิดครั้งแรกจะมี SmartScreen warning)

      - name: Build .exe installer (signed)
        if: ${{ secrets.WIN_CERT_P12_BASE64 != '' }}
        env:
          CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: npx electron-builder --win --x64

      - name: Build .exe installer (unsigned)
        if: ${{ secrets.WIN_CERT_P12_BASE64 == '' }}
        run: npx electron-builder --win --x64

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: batch-file-renamer-win-exe
          path: release/*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release (เมื่อ push tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
